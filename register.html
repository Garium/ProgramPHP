  <body style="background-color: #2A2334;">
<img src="IMG/Logo.JPG" alt="IMG/Logo.JPG" width="175" height="175" id="goLeft">
 <div class="container" id="Register" style="background-color: #2A2334;color: #d6bcfa; border-color:#000000">
	<h1 class="text-center"id="Register">Register</h1>
	<div class="row" style="background-color: #2A2334;border-color:#000000">
		<div class="col-sm">
		  
		  <div class="card" style="background-color: #2A2334;color: #d6bcfa; border-color:#000000">
  <div class="card-header" id="identifier" style="background-color: #2e2b33;color: #d6bcfa; border-color:#000000">
    register
  </div>
  <div class="card-body" style="background-color: #432f5e;color: #d6bcfa; border-color:#000000">
		    <form name="registerForm" action="register.php" style="background-color: #432f5e" method="POST">
			  <div class="form-row">
				<div class="form-group col-md-6">
				  <input type="text" class="form-control" id="identifier" name="CompanyName" style="color: #542e89" placeholder="Enter Company Name" required>
				</div>
			  
				<div class="form-group col-md-6"> 
				  <input type="email" class="form-control" id="identifier" name="Contactemail" style="color: #542e89" placeholder="Enter you a email to contact you" required>
				</div>
			  </div>
		
			<div class="form-row">
				<div class="form-group col-md-12">
				  <input type="password" class="form-control" id="identifier" style="color: #542e89" placeholder="Create Password" name="password" required>
				</div>
			</div>
			<div class="form-row">
				<div class="form-group col-md-12">
					
					<div id="strengthText"></div>
					<div id="passwordError" class="error"></div>
				</div>
			</div>
            
			<h2>Register Fee is £50, with a subscription of £99.99 annually</h2>
			<h4>T&C: For this purpose, it is automatically agreed upon that any information provided should be accurate, to the best of the companies ability and knowledge	</h4>

			<label>Name on Card</label>
            <input type="text" name="card_name" style="color: #542e89;"  class="form-control" placeholder="Enter Name on Card" required id="fontChange">
        <br>
                <br>

            <label>Card Number</label>
            <input type="text" name="card_number" style="color: #542e89;" class="form-control" placeholder="1234 5678 9012 3456" required id="fontChange">
        <br>
                <br>

            <label>Expiry (MM/YY)</label>
            <input type="text" name="expiry" style="color: #542e89;" class="form-control" required id="fontChange">
        </br>
                <br>

            <label>CVV</label>
            <input type="text" name="cvv" style="color: #542e89;" class="form-control" required id="fontChange">
        </br>        <br>
			<div class="form-row">
				<div class="form-group col-md-12">
				  <button class="btn btn-block" style="background-color: #2e2b33;color: #b794f6" id="identifier" type="submit">Register  </button>
				</div>
			</div>
			</form>
